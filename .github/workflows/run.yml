name: test

on:
  schedule:
    - cron: '0 18 * * *'  # 北京时间凌晨2点
  workflow_dispatch:

# 👉 关键：强制使用 Node.js 24 运行所有 Action，彻底消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sign_in:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须：允许提交日志

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 设置时区(北京时间)
        run: sudo timedatectl set-timezone Asia/Shanghai
        continue-on-error: true

      - name: 修改DNS
        run: |
          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          echo "nameserver 8.8.4.4" | sudo tee -a /etc/resolv.conf

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行签到 + 记录日志
        run: |
          set +e
          python main.py > script_output.log 2>&1
          SCRIPT_EXIT_CODE=$?
          set -e

          echo -e "---\n## 自动签到执行日志" >> log.md
          echo -e "执行时间(北京时间): $(date +'%Y-%m-%d %H:%M:%S')" >> log.md
          if [ $SCRIPT_EXIT_CODE -eq 0 ]; then
            echo -e "执行状态: ✅ 签到成功" >> log.md
          else
            echo -e "执行状态: ❌ 签到失败（错误码: $SCRIPT_EXIT_CODE）" >> log.md
          fi
          echo -e "脚本详情:\n\`\`\`bash\n$(cat script_output.log)\n\`\`\`\n" >> log.md
          rm -rf script_output.log
        env:
          COOKIES: ${{ secrets.COOKIES }}
          WECHAT_ID: ${{ secrets.WECHAT_ID }}
          WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          SERVER_KEY: ${{ secrets.SERVER_KEY }}

      - name: 提交日志到仓库
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add log.md
          git pull origin main --no-rebase --autostash
          git commit -m "chore: 自动更新签到日志 $(date +'%Y-%m-%d')"
          git push origin main
        continue-on-error: true
